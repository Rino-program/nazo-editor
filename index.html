<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>nazo editor</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo"><em>nazo</em> editor</div>
    <div id="export-row">
      <input id="filename-input" type="text" value="code" placeholder="filename"
             spellcheck="false" autocomplete="off">
      <span class="dot">.</span>
      <select id="ext-select">
        <option>txt</option><option>js</option><option>ts</option>
        <option>jsx</option><option>tsx</option><option>py</option>
        <option>html</option><option>css</option><option>json</option>
        <option>md</option><option>rs</option><option>go</option>
        <option>java</option><option>c</option><option>cpp</option>
        <option>rb</option><option>php</option><option>sh</option>
        <option>yaml</option><option>toml</option>
      </select>
      <button id="export-btn">↓ export</button>
    </div>
  </div>

  <div id="editor-wrapper">
    <canvas id="canvas"></canvas>
    <div id="placeholder">// start typing to begin…</div>
    <textarea id="hidden-input"
      autocomplete="off" autocorrect="off" autocapitalize="none"
      spellcheck="false" wrap="off"></textarea>
  </div>

  <div id="statusbar">
    <span id="sb-pos">Ln 1, Col 1</span>
    <span id="sb-chars">0 chars</span>
  </div>
</div>
<script src="./script.js"></script>
</body>
</html>
